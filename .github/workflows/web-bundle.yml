name: Web bundle

on:
  push:
    branches: [ web-wasm-port ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-bundle-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: '1.95.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
        with:
          rustflags: ''
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'
      # Root-relative so the bundle serves from a domain/subdomain root. The
      # committed crates/wzmapeditor/data/ is copied into dist/ by the
      # index.html copy-dir link, so the zip is self-contained (app + data).
      - name: Build web bundle
        run: trunk build --release --public-url "/" crates/wzmapeditor/index.html
      - name: Package web bundle
        run: |
          ( cd crates/wzmapeditor/dist && zip -qr "$GITHUB_WORKSPACE/wzmapeditor-web.zip" . )
          {
            echo "### Web bundle"
            echo "- zip: $(du -h wzmapeditor-web.zip | cut -f1)"
            echo "- unpacked: $(du -sh crates/wzmapeditor/dist | cut -f1)"
          } >> "$GITHUB_STEP_SUMMARY"
          ls -lh wzmapeditor-web.zip
      - name: Upload web bundle zip
        uses: actions/upload-artifact@v4
        with:
          name: wzmapeditor-web
          path: wzmapeditor-web.zip
