name: Dispatch Release Web Deployment

on:
  release:
    types: [published]

jobs:
  dispatch-to-deploy-repo:
    runs-on: ubuntu-latest
    environment: deploy_web
    steps:
      - name: Generate Cross-Repo Token via App
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.DEPLOY_TRIGGER_APP_CLIENT_ID }}
          private-key: ${{ secrets.DEPLOY_TRIGGER_APP_PRIVATE_KEY }}
          repositories: "Warzone2100/wzmapeditor-deploy-site"

      - name: Dispatch Event to Deployment Repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/Warzone2100/wzmapeditor-deploy-site/dispatches \
            -f "event_type=publish_artifact" \
            -F "client_payload[tag]=${{ github.event.release.tag_name }}"
