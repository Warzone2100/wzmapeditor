<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>wzmapeditor</title>

    <!-- Favicon: the same editor icon shown on the splash. -->
    <link data-trunk rel="icon" href="icons/256x256.png" />

    <!-- Trunk rewrites this to the deploy base path (e.g. /wzmapeditor/) so a
         project GitHub Pages site resolves assets correctly. -->
    <base data-trunk-public-url />

    <link data-trunk rel="rust" data-wasm-opt="z"
        data-wasm-opt-params="--enable-bulk-memory --enable-sign-ext --enable-mutable-globals --enable-nontrapping-float-to-int --enable-multivalue --enable-reference-types" />

    <!-- Vendored Basis Universal transcoder (Apache-2.0); decodes the uploaded
         high.wz KTX2/UASTC terrain in the browser. Loaded on demand by
         js/basis_glue.js. -->
    <link data-trunk rel="copy-file" href="vendor/basis/basis_transcoder.js" />
    <link data-trunk rel="copy-file" href="vendor/basis/basis_transcoder.wasm" />

    <!-- Bundle the slimmed WZ2100 data into dist/ so the web build fetches
         base.wz/mp.wz/classic.wz from /data/ with no user upload required. -->
    <link data-trunk rel="copy-dir" href="data" />

    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#909090" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#404040" />

    <!-- The editor handles right-clicks itself (camera rotate, tool secondary
         actions), so the browser's native context menu is never wanted. eframe
         suppresses it on the canvas, but only when it can lock the app runner,
         so it leaks on a right-button release during a camera drag. This
         capture-phase listener has no such gate.

         Shift+right-click is a browser escape hatch (WHATWG-sanctioned) that
         opens the native menu regardless of preventDefault. While that menu is
         open the page stops receiving keyup/pointerup, so the fly camera's held
         keys and right button get stuck "down" and it keeps moving. eframe never
         notices: the canvas stays document.activeElement, so it keeps reporting
         focus. We force the recovery — release the right button (honored because
         egui still thinks a pointer is down), then blur the canvas so eframe's
         focus-loss path clears the held keys. -->
    <script>
        addEventListener("contextmenu", function (e) {
            e.preventDefault();
            if (!e.shiftKey) return;
            const canvas = document.getElementById("the_canvas_id");
            if (!canvas) return;
            canvas.dispatchEvent(new PointerEvent("pointerup", {
                button: 2, bubbles: true, clientX: e.clientX, clientY: e.clientY,
            }));
            canvas.blur();
        }, true);
    </script>

    <style>
        html,
        body {
            overflow: hidden;
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            width: 100%;
            background-color: #1b1b1b;
            color: #f0f0f0;
        }

        @media (prefers-color-scheme: light) {

            html,
            body {
                background-color: #f0f0f0;
                color: #1b1b1b;
            }
        }

        canvas {
            margin-right: auto;
            margin-left: auto;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .centered {
            margin-right: auto;
            margin-left: auto;
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-family: Ubuntu-Light, Helvetica, sans-serif;
            text-align: center;
        }
    </style>
</head>

<body>
    <canvas id="the_canvas_id"></canvas>

    <div class="centered" id="loading_text">
        <p style="font-size:16px">Loading wzmapeditor…</p>
    </div>
</body>

</html>
