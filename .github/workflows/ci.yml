name: CI

on:
  push:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Compose grouped release notes and create the release
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        TAG="${GITHUB_REF#refs/tags/}"
        PRIOR="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
        if [ -n "$PRIOR" ]; then
          RANGE="${PRIOR}..${TAG}"
        else
          RANGE="${TAG}"
        fi

        bucket() {
          local prefix="$1"
          git log "$RANGE" --no-merges --pretty='format:%s' \
            | awk -v p="^${prefix}: " '$0 ~ p { sub(p,""); print "- " $0 }'
        }

        ADDED="$(bucket Add)"
        FIXED="$(bucket Fix)"
        CHANGED="$(bucket Update)"
        REMOVED="$(bucket Remove)"
        OTHER="$(git log "$RANGE" --no-merges --pretty='format:%s' \
          | awk '!/^(Add|Fix|Update|Remove|CI|ci|config):/ && !/^Bump version/ { print "- " $0 }')"

        NOTES="$(mktemp)"
        {
          [ -n "$ADDED"   ] && { printf '## Added\n%s\n\n'    "$ADDED";   }
          [ -n "$FIXED"   ] && { printf '## Fixed\n%s\n\n'    "$FIXED";   }
          [ -n "$CHANGED" ] && { printf '## Changed\n%s\n\n'  "$CHANGED"; }
          [ -n "$REMOVED" ] && { printf '## Removed\n%s\n\n'  "$REMOVED"; }
          [ -n "$OTHER"   ] && { printf '## Other\n%s\n\n'    "$OTHER";   }
          if [ -n "$PRIOR" ]; then
            printf '**Full changelog:** https://github.com/%s/compare/%s...%s\n' \
              "${GITHUB_REPOSITORY}" "${PRIOR}" "${TAG}"
          fi
        } > "$NOTES"

        echo "----- release notes preview -----"
        cat "$NOTES"
        echo "----- end preview -----"

        if ! gh release view "$TAG" >/dev/null 2>&1; then
          gh release create "$TAG" --notes-file "$NOTES" --title "$TAG"
        fi

  build:
    needs: [create-release]
    if: ${{ !cancelled() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}

    strategy:
      matrix:
        include:
          - name: Windows-x64
            os: windows-latest
            rust_target: 'x86_64-pc-windows-msvc'
            output_desc: 'windows-x64'
          - name: Windows-aarch64
            os: windows-latest
            rust_target: 'aarch64-pc-windows-msvc'
            output_desc: 'windows-arm64'
          - name: macOS
            os: macos-latest
            rust_target: 'aarch64-apple-darwin'
            output_desc: 'macos-arm64'
          - name: Linux-x64
            os: ubuntu-latest
            rust_target: 'x86_64-unknown-linux-gnu'
            output_desc: 'linux-x64'
            use_cross: true
          - name: Linux-aarch64
            os: ubuntu-latest
            rust_target: 'aarch64-unknown-linux-gnu'
            output_desc: 'linux-arm64'
            use_cross: true
      fail-fast: false

    name: '${{ matrix.name }}'
    runs-on: '${{ matrix.os }}'

    permissions:
      contents: write

    env:
      RUSTUP_TOOLCHAIN: '1.95.0'
      RUSTTARGET: '${{ matrix.rust_target }}'
      USE_CROSS: '${{ matrix.use_cross }}'
      WZMAPEDITOR_OUTPUT_DESC: '${{ matrix.output_desc }}'

    steps:
    - uses: actions/checkout@v6
    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install findutils
    - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
      with:
        rustflags: ''
    - name: Prepare Rust toolchain
      shell: bash
      run: |
        echo $RUSTTARGET
        rustup target add "$RUSTTARGET" >&2
    - name: Install Cross
      if: matrix.use_cross == true
      run: cargo install cross --git https://github.com/cross-rs/cross --rev 65fe72b0cdb1e7e0cc0652517498d4389cc8f5cf
    - name: Build
      id: cargo_build
      shell: bash
      run: .ci/build.sh
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.cargo_build.outputs.BUILT_ARCHIVE }}
        archive: false
    - name: Attach to release
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        gh release upload "$TAG" \
          "${{ steps.cargo_build.outputs.BUILT_ARCHIVE }}" \
          --clobber

  web-bundle:
    needs: [create-release]
    if: ${{ !cancelled() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') }}
    name: Web bundle
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      RUSTUP_TOOLCHAIN: '1.95.0'

    steps:
    - uses: actions/checkout@v6
    # The web build lives on the web port branch (and, once merged, main). Skip
    # gracefully on refs that don't have it so native-only tags/branches stay
    # green; the rest of the job no-ops when there's nothing to build.
    - name: Detect web build
      id: detect
      shell: bash
      run: |
        if [ -f crates/wzmapeditor/index.html ]; then
          echo "present=true" >> "$GITHUB_OUTPUT"
        else
          echo "present=false" >> "$GITHUB_OUTPUT"
          echo "No web build on this ref; skipping."
        fi
    - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
      if: steps.detect.outputs.present == 'true'
      with:
        rustflags: ''
    - name: Add wasm target
      if: steps.detect.outputs.present == 'true'
      run: rustup target add wasm32-unknown-unknown
    - name: Install Trunk
      if: steps.detect.outputs.present == 'true'
      run: |
        curl -fsSL https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz \
          | tar -xzf - -C "$HOME/.cargo/bin"
        trunk --version
    # Run from the crate dir so trunk resolves the package from the local
    # Cargo.toml/Trunk.toml, not the workspace's virtual root manifest. Root
    # relative (`/`) so the same bundle serves any domain root.
    - name: Build web bundle
      if: steps.detect.outputs.present == 'true'
      working-directory: crates/wzmapeditor
      run: trunk build --release --public-url "/" index.html
    - name: Package web bundle
      if: steps.detect.outputs.present == 'true'
      shell: bash
      run: |
        ( cd crates/wzmapeditor/dist && zip -qr "$GITHUB_WORKSPACE/wzmapeditor-web.zip" . )
        ls -lh wzmapeditor-web.zip
    - name: Upload artifact
      if: steps.detect.outputs.present == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: wzmapeditor-web
        path: wzmapeditor-web.zip
        archive: false
    - name: Attach to release
      if: ${{ steps.detect.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/') }}
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        gh release upload "$TAG" wzmapeditor-web.zip --clobber
