name: CI

on:
  push:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    strategy:
      matrix:
        include:
          - name: Windows-x64
            os: windows-latest
            rust_target: 'x86_64-pc-windows-gnu'
          - name: macOS
            os: macos-latest
            rust_target: 'aarch64-apple-darwin'
          - name: Linux-x64
            os: ubuntu-latest
            rust_target: 'x86_64-unknown-linux-gnu'
            use_cross: true
          - name: Linux-aarch64
            os: ubuntu-latest
            rust_target: 'aarch64-unknown-linux-gnu'
            use_cross: true
      fail-fast: false

    name: '${{ matrix.name }}'
    runs-on: '${{ matrix.os }}'

    env:
      RUSTUP_TOOLCHAIN: '1.95.0'
      RUSTTARGET: '${{ matrix.rust_target }}'
      USE_CROSS: '${{ matrix.use_cross }}'

    steps:
    - uses: actions/checkout@v6
    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install findutils
    - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
    - name: Prepare Rust toolchain
      shell: bash
      run: |
        echo $RUSTTARGET
        rustup target add "$RUSTTARGET" >&2
    - name: Install Cross
      if: matrix.use_cross == true
      run: cargo install cross --git https://github.com/cross-rs/cross --rev 65fe72b0cdb1e7e0cc0652517498d4389cc8f5cf
    - name: Build
      id: cargo_build
      shell: bash
      run: .ci/build.sh
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.cargo_build.outputs.BUILT_ARCHIVE }}
        archive: false
    - name: Upload checksum
      uses: actions/upload-artifact@v7
      with:
        path: ${{ steps.cargo_build.outputs.BUILT_CHECKSUM }}
        archive: false
