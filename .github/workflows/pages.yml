name: GitHub Pages

on:
  push:
    branches: [ web-wasm-port ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: '1.95.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
        with:
          rustflags: ''
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'
      - name: Build
        run: trunk build --release --public-url "/${{ github.event.repository.name }}/" crates/wzmapeditor/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/wzmapeditor/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
